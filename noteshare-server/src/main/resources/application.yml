server:
  port: 8200
  address: 0.0.0.0

spring:
  application:
    name: noteshare-server

  # 默认使用 MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/noteshare?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    username: root
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# JWT 配置
jwt:
  secret: ${JWT_SECRET:noteshare-jwt-secret-key-for-hs512-must-be-at-least-512-bits-long-64bytes}
  expiration: 604800000       # 7 天

# 文件存储配置
file:
  upload-dir: ./uploads
  allowed-types:
    - image/jpeg
    - image/png
    - image/gif
    - image/webp
  max-size: 5242880           # 5MB
  video-max-size: 52428800    # 50MB
